name: Build & Release

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8 -XX:+UseG1GC"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION_CODE=$(git rev-list --count HEAD)
          VERSION_NAME="1.0.${VERSION_CODE}"
          TAG="v${VERSION_NAME}"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build Debug APK
        shell: bash
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --build-cache \
            -PversionCode=${{ steps.version.outputs.version_code }} \
            -PversionName=${{ steps.version.outputs.version_name }}

      - name: Rename APK
        shell: bash
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SwiftSlate-${{ steps.version.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftSlate-${{ steps.version.outputs.tag }}
          path: app/build/outputs/apk/debug/SwiftSlate-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SwiftSlate ${{ steps.version.outputs.tag }}
          body: |
            ## What's New
            - Added CodexAPI free AI provider support
            - Added Copilot (unofficial) free AI provider support
            - Random model selection for CodexAPI
          files: app/build/outputs/apk/debug/SwiftSlate-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
